
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    log_format  timing  '$remote_addr [$time_local] "$request" $status '
                        'rt=$request_time '
                        'uct=$upstream_connect_time '
                        'uht=$upstream_header_time '
                        'urt=$upstream_response_time '
                        'upstream="$upstream_addr" '
                        'prerender=$prerender '
                        'ua="$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    map $http_user_agent $prerender_ua {
        default       0;
        "~*Prerender" 0;

        "~*googlebot"                               1;
        "~*yahoo!\ slurp"                           1;
        "~*bingbot"                                 1;
        "~*yandex"                                  1;
        "~*baiduspider"                             1;
        "~*facebookexternalhit"                     1;
        "~*twitterbot"                              1;
        "~*rogerbot"                                1;
        "~*linkedinbot"                             1;
        "~*embedly"                                 1;
        "~*quora\ link\ preview"                    1;
        "~*showyoubot"                              1;
        "~*outbrain"                                1;
        "~*pinterest\/0\."                          1;
        "~*developers.google.com\/\+\/web\/snippet" 1;
        "~*slackbot"                                1;
        "~*vkshare"                                 1;
        "~*w3c_validator"                           1;
        "~*redditbot"                               1;
        "~*applebot"                                1;
        "~*whatsapp"                                1;
        "~*flipboard"                               1;
        "~*tumblr"                                  1;
        "~*bitlybot"                                1;
        "~*skypeuripreview"                         1;
        "~*nuzzel"                                  1;
        "~*discordbot"                              1;
        "~*google\ page\ speed"                     1;
        "~*qwantify"                                1;
        "~*pinterestbot"                            1;
        "~*bitrix\ link\ preview"                   1;
        "~*xing-contenttabreceiver"                 1;
        "~*chrome-lighthouse"                       1;
        "~*telegrambot"                             1;
        "~*google-inspectiontool"                   1;
        "~*petalbot"                                1;
	"~*ahrefs"		                    1;
	"~*adsbot"				    1;
    }

    map $args $prerender_args {
        default $prerender_ua;
        "~(^|&)_escaped_fragment_=" 1;
    }

    map $http_x_prerender $x_prerender {
        default $prerender_args;
        "1"     0;
    }

    map $uri $prerender {
        default $x_prerender;
        "~*\.(js|css|xml|less|png|jpg|jpeg|gif|pdf|txt|ico|rss|zip|mp3|rar|exe|wmv|doc|avi|ppt|mpg|mpeg|tif|wav|mov|psd|ai|xls|mp4|m4a|swf|dat|dmg|iso|flv|m4v|torrent|ttf|woff|woff2|svg|eot)" 0;
    }

    upstream s3_bucket {
        # Replace with your static site origin (e.g. an S3 website endpoint or any HTTP host)
        server your-static-site-origin.example.com:80;
        keepalive 16;
    }

    upstream prerender_backend {
        server prerender:8830;
        keepalive 32;
    }

    server {
       listen 80;
       error_log /var/log/nginx/site-error.log error;
       # Replace with your static site origin hostname (must match the upstream server value)
       set $bucket "your-static-site-origin.example.com";

        location ^~ /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
            allow all;
            try_files $uri =404;
            break;
        }

        location = /robots.txt {
            default_type text/plain;
            # Replace https://example.com with your site's canonical URL
            return 200 "User-agent: *\nAllow: /\nSitemap: https://example.com/sitemap.xml\n";
        }

        location = /sitemap.xml {
            default_type text/xml;
            # Replace with the URL where your sitemap.xml is hosted
            proxy_pass https://your-asset-bucket.example.com/sitemap/sitemap.xml;
        }	   

	location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            access_log /var/log/nginx/timing.log timing;
            proxy_http_version     1.1;
            proxy_redirect         off;
            proxy_set_header       Connection "";
            proxy_set_header       Host $bucket;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            # Remove the x-amz-* lines below if your origin is not AWS S3
            proxy_hide_header      x-amz-id-2;
            proxy_hide_header      x-amz-request-id;
            proxy_hide_header      x-amz-meta-server-side-encryption;
            proxy_hide_header      x-amz-server-side-encryption;
            proxy_intercept_errors on;
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://s3_bucket;
	}

        location / {
            access_log /var/log/nginx/timing.log timing;

            if ($prerender = 1) {
                rewrite (.*) /prerender-proxy last;
            }

            proxy_http_version     1.1;
            proxy_redirect         off;
            proxy_set_header       Connection "";
            proxy_set_header       Host $bucket;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            # Remove the x-amz-* lines below if your origin is not AWS S3
            proxy_hide_header      x-amz-id-2;
            proxy_hide_header      x-amz-request-id;
            proxy_hide_header      x-amz-meta-server-side-encryption;
            proxy_hide_header      x-amz-server-side-encryption;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
            proxy_pass http://s3_bucket;
        }

        location /prerender-proxy {
            access_log /var/log/nginx/timing.log timing;

            if ($prerender = 0) {
                return 404;
            }

            rewrite .* /https://$host$request_uri? break;
            proxy_http_version     1.1;
            proxy_set_header       Connection "";
            proxy_set_header       Host $host;
            add_header             Cache-Control "private,max-age=600,must-revalidate";
            proxy_pass             http://prerender_backend;
        }
    }
}
